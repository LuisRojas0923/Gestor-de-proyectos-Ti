name: CI Tests

on:
  push:
    branches: [ "main", "NOVEDADES_NOMINA_V2", "restaurar-tablas-auditoria" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: adminpassword
          POSTGRES_DB: gestor_proyectos_ti
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        cd backend_v2
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pandas openpyxl httpx
    - name: Run Backend Tests
      env:
        DATABASE_URL: postgresql+asyncpg://admin:adminpassword@localhost:5432/gestor_proyectos_ti
        ERP_DATABASE_URL: postgresql+asyncpg://admin:adminpassword@localhost:5432/gestor_proyectos_ti
        SECRET_KEY: testsecret
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd backend_v2
        
        # Iniciar DB y migrar/sembrar básico
        PYTHONPATH=. python -c "import asyncio; from app.database import init_db; asyncio.run(init_db())"
        
        # Levantar la API en vivo para tests in-process y E2E
        PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        
        # Esperar al health check
        echo "Waiting for API to start..."
        timeout 30 bash -c 'until curl -s http://127.0.0.1:8000/docs > /dev/null; do sleep 1; done' || (echo "API failed to start"; exit 1)
        echo "API started successfully."
        
        # Ejecutar Pytest (In-process & E2E combinados)
        PYTHONPATH=. pytest ../testing/backend/ -v

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: |
        cd frontend
        npm ci || npm install
    - name: TypeScript Check
      run: |
        cd frontend
        npx tsc -p tsconfig.app.json --noEmit
    - name: Lint
      run: |
        cd frontend
        npm run lint
    - name: Test
      run: |
        cd frontend
        npx vitest run --passWithNoTests
    - name: Build
      run: |
        cd frontend
        npm run build
