name: Nómina CI Tests

on:
  push:
    branches: [ "main", "NOVEDADES_NOMINA_V2" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        cd backend_v2
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pandas openpyxl
    - name: Run Pytest
      run: |
        cd backend_v2
        PYTHONPATH=. pytest tests/ ../testing/backend/ -v
