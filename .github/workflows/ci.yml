name: Nómina CI Tests

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Pytest & DB
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: adminpassword
          POSTGRES_DB: gestor_proyectos_ti
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend_v2
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pandas openpyxl httpx

    - name: Start FastAPI Server & Init DB
      working-directory: ./backend_v2
      env:
        DATABASE_URL: postgresql+asyncpg://admin:adminpassword@localhost:5432/gestor_proyectos_ti
        SECRET_KEY: testsecret_insecure_ci_only
      run: |
        uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        echo "Esperando inicializacion de DB y servidor..."
        curl -f --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:8000/api/v2/health

    - name: Run Backend Pytest Suite
      working-directory: ./backend_v2
      env:
        DATABASE_URL: postgresql+asyncpg://admin:adminpassword@localhost:5432/gestor_proyectos_ti
        SECRET_KEY: testsecret_insecure_ci_only
        TEST_BASE_URL: http://127.0.0.1:8000/api/v2
      run: |
        PYTHONPATH=. pytest ../testing/backend/ -v

  frontend-tests:
    name: Frontend Lint, TypeScript, Vitest & Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      working-directory: ./frontend
      # package-lock.json es obligatorio — no se permite npm install sin lockfile
      run: npm ci

    - name: Run ESLint
      working-directory: ./frontend
      run: npm run lint

    - name: Type-Check (TypeScript)
      working-directory: ./frontend
      run: npx tsc --noEmit

    - name: Run Vitest
      working-directory: ./frontend
      run: npm run test -- --run

    - name: Build Application
      working-directory: ./frontend
      run: npm run build
