name: "Revisores IA (OpenCode)"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  agent-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        agent:
          - backend-reviewer
          - frontend-reviewer
          - security-rbac-reviewer
          - docs-tests-reviewer
          - scope-reviewer
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Generar Diff del PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Ejecutar Agente Especializado
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SYSTEM_PROMPT_FILE: .opencode/agent/${{ matrix.agent }}.md
          DIFF_FILE: pr.diff
          AGENT_NAME: ${{ matrix.agent }}
        run: |
          python .github/scripts/ai_reviewer.py

      - name: Publicar comentario en el PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "review_output.md" ]; then
            gh pr comment ${{ github.event.pull_request.number }} -F review_output.md
          else
            echo "No se generó reporte."
          fi
