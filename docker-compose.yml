x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  #  nginx:
  #    image: nginx:alpine
  #    container_name: gestor-de-proyectos-ti-nginx
  #    ports:
  #      - "80:80"
  #    volumes:
  #      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #    depends_on:
  #      - frontend
  #      - backend
  #    networks:
  #      - app-network

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    ports:
      - "8000:8000" # Re-expuesto para acceso directo por IP:8000
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager}
      - APP_VERSION=v2.1.0-DEV
      - ERP_DATABASE_URL=${ERP_DATABASE_URL}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - FRONTEND_URL=http://${FRONTEND_HOST:-localhost}
      - TZ=America/Bogota
    volumes:
      - ./backend_v2:/app
    depends_on:
      - db
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 # Modo Produccion
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # Modo Desarrollo
    networks:
      - app-network
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v2
    ports:
      - "${FRONTEND_PORT:-80}:80" # Re-expuesto para acceso directo por IP:80 (Nginx)
    environment:
      # URL RELATIVA: Para que funcione en produccion a traves del proxy
      - VITE_API_BASE_URL=/api/v2
    depends_on:
      - backend
    networks:
      - app-network
    logging: *default-logging

  adminer:
    image: adminer
    container_name: gestor-de-proyectos-ti-adminer
    restart: always
    ports:
      - "8085:8080"
    depends_on:
      - db
    networks:
      - app-network
    logging: *default-logging

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432" # Re-expuesto para mantenimiento
    networks:
      - app-network
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    container_name: gestor-de-proyectos-ti-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network
    logging: *default-logging

  grafana:
    image: grafana/grafana-oss:latest
    container_name: gestor-de-proyectos-ti-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app-network
    logging: *default-logging

  loki:
    image: grafana/loki:latest
    container_name: gestor-de-proyectos-ti-loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network
    logging: *default-logging

  promtail:
    image: grafana/promtail:latest
    container_name: gestor-de-proyectos-ti-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network
    logging: *default-logging

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
