services:

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    ports:
      - "8000:8000" # Re-expuesto para acceso directo por IP:8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASS:-pass}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager} # [CONTROLADO]
      - APP_VERSION=v2.1.0-DEV
      - ERP_DATABASE_URL=${ERP_DATABASE_URL}
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY} # [CONTROLADO]
      - ALGORITHM=${ALGORITHM}
      - JWT_TOKEN_EXPIRE_MINUTES=${JWT_TOKEN_EXPIRE_MINUTES} # [CONTROLADO]
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - BIOMETRIA_ENGINE_URL=http://biometria-engine:8010
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:-}
      - BIOMETRIA_ENGINE_TIMEOUT_SECONDS=${BIOMETRIA_ENGINE_TIMEOUT_SECONDS:-30}
      - DEEPFACE_MODEL=${DEEPFACE_MODEL:-Facenet}
      - DEEPFACE_DETECTOR=${DEEPFACE_DETECTOR:-opencv}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-0.40}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-}
      - SYNC_EXTERNAL_URL=${SYNC_EXTERNAL_URL}
      - FRONTEND_URL=http://${FRONTEND_HOST:-localhost}
      - TZ=America/Bogota
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend_v2:/app
      - ./backend_v2/uploads:/app/uploads
      - ./GestionTi_SoporteFiles:/app/storage/attachments
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # Modo Desarrollo
    networks:
      - app-network
      - biometria-internal

  biometria-engine:
    build:
      context: ./biometria_engine
      dockerfile: Dockerfile
    expose:
      - "8010"
    environment:
      - ENVIRONMENT=development
      - DEEPFACE_MODEL=${DEEPFACE_MODEL:-Facenet}
      - DEEPFACE_DETECTOR=${DEEPFACE_DETECTOR:-opencv}
      - ANTI_SPOOFING=${ANTI_SPOOFING:-1}
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:-}
    volumes:
      - deepface_weights:/root/.deepface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5).read()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - biometria-internal

  redis:
    image: redis:alpine
    container_name: gestor-de-proyectos-ti-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  frontend:
    # ... (rest of frontend config)
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173" # Re-expuesto para acceso directo por IP:5173
    environment:
      # URL RELATIVA: Permite que funcione por IP o por Dominio automáticamente a través de Nginx (puerto 80)
      - VITE_API_BASE_URL=/api/v2
      # El host actual requiere polling; puede desactivarse si otro host propaga eventos.
      - VITE_USE_POLLING=${VITE_USE_POLLING:-true}
      - VITE_POLLING_INTERVAL_MS=${VITE_POLLING_INTERVAL_MS:-2000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  adminer:
    image: adminer
    container_name: gestor-de-proyectos-ti-adminer
    restart: always
    ports:
      - "8087:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASS:-pass} # [CONTROLADO]
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432" # Re-expuesto para mantenimiento
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-project_manager}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  biometria-internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  deepface_weights:
