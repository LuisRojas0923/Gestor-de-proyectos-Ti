services:

  provision-roles:
    image: postgres:15-alpine
    profiles: ["database-admin"]
    environment:
      - PGHOST=db
      - PGPASSWORD=${DB_PASS:-pass}
      - POSTGRES_PASSWORD=${DB_PASS:-pass}
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - APP_SCHEMA_OWNER_ROLE=${DB_SCHEMA_OWNER_ROLE:-gestor_schema_owner}
      - APP_MIGRATION_ROLE=${DB_MIGRATION_USER:-gestor_migrador}
      - APP_MIGRATION_PASSWORD=${DB_MIGRATION_PASS:-migrator-local-only}
      - APP_RUNTIME_ROLE=${DB_RUNTIME_USER:-gestor_runtime}
      - APP_RUNTIME_PASSWORD=${DB_RUNTIME_PASS:-runtime-local-only}
    volumes:
      - ./postgres/init/01-gestor-roles.sh:/opt/gestor/01-gestor-roles.sh:ro
    depends_on:
      db:
        condition: service_healthy
    command: sh /opt/gestor/01-gestor-roles.sh
    networks:
      - app-network

  migrate:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    environment:
      - MIGRATION_DATABASE_URL=postgresql://${DB_MIGRATION_USER:-gestor_migrador}:${DB_MIGRATION_PASS:-migrator-local-only}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager}
      - APP_PROCESS_ROLE=migrate
      - MIGRATION_DATABASE_ROLE=${DB_MIGRATION_USER:-gestor_migrador}
      - MIGRATION_SCHEMA_OWNER_ROLE=${DB_SCHEMA_OWNER_ROLE:-gestor_schema_owner}
      - DATABASE_RUNTIME_ROLE=${DB_RUNTIME_USER:-gestor_runtime}
      - DATABASE_MIGRATION_ROLE=${DB_MIGRATION_USER:-gestor_migrador}
      - DATABASE_SCHEMA_OWNER_ROLE=${DB_SCHEMA_OWNER_ROLE:-gestor_schema_owner}
      - RBAC_ADMIN_CAPABILITY_FILE=/run/secrets/rbac_admin_capability
      - TZ=America/Bogota
    secrets:
      - rbac_admin_capability
    volumes:
      - ./backend_v2:/app
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.manage migrate
    restart: "no"
    networks:
      - app-network

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    ports:
      - "8000:8000" # Re-expuesto para acceso directo por IP:8000
    environment:
      - DATABASE_URL=postgresql://${DB_RUNTIME_USER:-gestor_runtime}:${DB_RUNTIME_PASS:-runtime-local-only}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager}
      - BASE_DATOS_URL_ASYNC=postgresql+asyncpg://${DB_RUNTIME_USER:-gestor_runtime}:${DB_RUNTIME_PASS:-runtime-local-only}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager}
      - DATABASE_RUNTIME_ROLE=${DB_RUNTIME_USER:-gestor_runtime}
      - DATABASE_MIGRATION_ROLE=${DB_MIGRATION_USER:-gestor_migrador}
      - DATABASE_SCHEMA_OWNER_ROLE=${DB_SCHEMA_OWNER_ROLE:-gestor_schema_owner}
      - RBAC_ADMIN_CAPABILITY_FILE=/run/secrets/rbac_admin_capability
      - APP_VERSION=v2.1.0-DEV
      - ERP_DATABASE_URL=${ERP_DATABASE_URL}
      - ERP_READ_DATABASE_URL=${ERP_READ_DATABASE_URL:?ERP_READ_DATABASE_URL is required}
      - ERP_READ_EXPECTED_DATABASE=${ERP_READ_EXPECTED_DATABASE:-solidpruebas3}
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY} # [CONTROLADO]
      - ALGORITHM=${ALGORITHM}
      - JWT_TOKEN_EXPIRE_MINUTES=${JWT_TOKEN_EXPIRE_MINUTES} # [CONTROLADO]
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - BIOMETRIA_ENGINE_URL=http://biometria-engine:8010
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:-}
      - BIOMETRIA_ENGINE_TIMEOUT_SECONDS=${BIOMETRIA_ENGINE_TIMEOUT_SECONDS:-30}
      - DEEPFACE_MODEL=${DEEPFACE_MODEL:-Facenet}
      - DEEPFACE_DETECTOR=${DEEPFACE_DETECTOR:-opencv}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-0.40}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-}
      - PORTAL_PENDING_PWD=${PORTAL_PENDING_PWD:?PORTAL_PENDING_PWD requerido}
      - ENTORNO=desarrollo
      - JWT_SECRETO=${JWT_SECRET_KEY}
      - JWT_ALGORITMO=${ALGORITHM:-HS256}
      - JWT_EXPIRACION_MINUTOS=${JWT_TOKEN_EXPIRE_MINUTES:-60}
      - CORS_ORIGENES_PERMITIDOS=${CORS_ORIGENES_PERMITIDOS:-*}
      - JIT_AUTO_APROBAR=${JIT_AUTO_APROBAR:-true}
      - VERIFY_ADMIN_RATE_LIMIT=${VERIFY_ADMIN_RATE_LIMIT:-5/5minute}
      - AUDITORIA_EVENTO_LIMPIAR_DIAS=${AUDITORIA_EVENTO_LIMPIAR_DIAS:-365}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN:-5/minute;20/hour}
      - RATE_LIMIT_SETUP_PASSWORD=${RATE_LIMIT_SETUP_PASSWORD:-30/hour}
      - RATE_LIMIT_FORGOT_PASSWORD=${RATE_LIMIT_FORGOT_PASSWORD:-3/hour}
      - RATE_LIMIT_RESET_PASSWORD=${RATE_LIMIT_RESET_PASSWORD:-5/hour}
      - RATE_LIMIT_REGISTRO=${RATE_LIMIT_REGISTRO:-5/hour}
      - RATE_LIMIT_PASSWORD_STATUS=${RATE_LIMIT_PASSWORD_STATUS:-5/minute}
      - RATE_LIMIT_LOGOUT=${RATE_LIMIT_LOGOUT:-10/minute}
      - RATE_LIMIT_MCP_TOKEN=${RATE_LIMIT_MCP_TOKEN:-5/hour}
      - RATE_LIMIT_MCP_TOKENS_LIST=${RATE_LIMIT_MCP_TOKENS_LIST:-30/minute}
      - RATE_LIMIT_MCP_TOKENS_REVOKE=${RATE_LIMIT_MCP_TOKENS_REVOKE:-10/minute}
      - RATE_LIMIT_REFRESH=${RATE_LIMIT_REFRESH:-20/hour}
      - RATE_LIMIT_SYNC_USUARIO_ERP=${RATE_LIMIT_SYNC_USUARIO_ERP:-10/minute}
      - RATE_LIMIT_PREVIEW_USUARIOS_ERP=${RATE_LIMIT_PREVIEW_USUARIOS_ERP:-2/hour}
      - RATE_LIMIT_APPLY_USUARIOS_ERP=${RATE_LIMIT_APPLY_USUARIOS_ERP:-1/hour}
      - LOCKOUT_UMBRAL_FALLOS=${LOCKOUT_UMBRAL_FALLOS:-10}
      - LOCKOUT_VENTANA_MINUTOS=${LOCKOUT_VENTANA_MINUTOS:-15}
      - LOCKOUT_DURACION_MINUTOS=${LOCKOUT_DURACION_MINUTOS:-15}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - CALENDARIFIC_API_KEY=${CALENDARIFIC_API_KEY:-}
      - LIBRANZA_OCCIDENTE_PASSWORD=${LIBRANZA_OCCIDENTE_PASSWORD:-}
      - BIOMETRIA_MAX_IMAGE_BYTES=${BIOMETRIA_MAX_IMAGE_BYTES:-5242880}
      - HOSTVEREMAIL=${HOSTVEREMAIL:-http://portalservicios.refridcol.com}
      - STORAGE_PATH=${STORAGE_PATH:-/app/storage/attachments}
      - STORAGE_MAX_SIZE_MB=${STORAGE_MAX_SIZE_MB:-25}
      - SYNC_EXTERNAL_URL=${SYNC_EXTERNAL_URL}
      - FRONTEND_URL=http://${FRONTEND_HOST:-localhost}
      - FRONTEND_HOST=${FRONTEND_HOST:-}
      - FRONTEND_PORT=${FRONTEND_PORT:-}
      - TZ=America/Bogota
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend_v2:/app
      - ./backend_v2/uploads:/app/uploads
      - ./GestionTi_SoporteFiles:/app/storage/attachments
    secrets:
      - rbac_admin_capability
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # Modo Desarrollo
    networks:
      - app-network
      - biometria-internal

  biometria-engine:
    build:
      context: ./biometria_engine
      dockerfile: Dockerfile
    expose:
      - "8010"
    environment:
      - ENVIRONMENT=development
      - DEEPFACE_MODEL=${DEEPFACE_MODEL:-Facenet}
      - DEEPFACE_DETECTOR=${DEEPFACE_DETECTOR:-opencv}
      - ANTI_SPOOFING=${ANTI_SPOOFING:-1}
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:-}
    volumes:
      - deepface_weights:/root/.deepface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5).read()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - biometria-internal

  redis:
    image: redis:alpine
    container_name: gestor-de-proyectos-ti-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  frontend:
    # ... (rest of frontend config)
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:5173:5173" # Acceso local estable por IPv4
    environment:
      # URL RELATIVA: Permite que funcione por IP o por Dominio automáticamente a través de Nginx (puerto 80)
      - VITE_API_BASE_URL=/api/v2
      # El host actual requiere polling; puede desactivarse si otro host propaga eventos.
      - VITE_USE_POLLING=${VITE_USE_POLLING:-true}
      - VITE_POLLING_INTERVAL_MS=${VITE_POLLING_INTERVAL_MS:-2000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  adminer:
    image: adminer
    container_name: gestor-de-proyectos-ti-adminer
    restart: always
    ports:
      - "8087:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init/01-gestor-roles.sh:/docker-entrypoint-initdb.d/01-gestor-roles.sh:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASS:-pass} # [CONTROLADO]
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - APP_SCHEMA_OWNER_ROLE=${DB_SCHEMA_OWNER_ROLE:-gestor_schema_owner}
      - APP_MIGRATION_ROLE=${DB_MIGRATION_USER:-gestor_migrador}
      - APP_MIGRATION_PASSWORD=${DB_MIGRATION_PASS:-migrator-local-only}
      - APP_RUNTIME_ROLE=${DB_RUNTIME_USER:-gestor_runtime}
      - APP_RUNTIME_PASSWORD=${DB_RUNTIME_PASS:-runtime-local-only}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432" # Re-expuesto para mantenimiento
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-project_manager}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  biometria-internal:
    driver: bridge
    internal: true

secrets:
  rbac_admin_capability:
    file: ${RBAC_ADMIN_CAPABILITY_FILE:-./secrets/rbac_admin_capability.key}

volumes:
  postgres_data:
  deepface_weights:
