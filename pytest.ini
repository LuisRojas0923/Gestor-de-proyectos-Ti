[pytest]
testpaths = testing/backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = scripts research
asyncio_mode = auto
markers =
    erp_postgres_integration: requiere exclusivamente el ERP PostgreSQL efimero erp-test
    mutating_integration: modifica exclusivamente la base local efimera db-test
    live_infrastructure: invoca el backend-test por HTTP dentro de la red aislada
