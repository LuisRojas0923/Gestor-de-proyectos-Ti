services:
  nginx:
    image: nginx:alpine
    container_name: gestor-de-proyectos-ti-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: gestor-de-proyectos-ti-redis-prod
    restart: always
    networks:
      - app-network

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - TZ=America/Bogota
      - REDIS_URL=redis://redis:6379/0
      - BIOMETRIA_ENGINE_URL=http://biometria-engine:8010
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:?BIOMETRIA_ENGINE_TOKEN requerido para biometria-engine}
      - BIOMETRIA_ENGINE_TIMEOUT_SECONDS=${BIOMETRIA_ENGINE_TIMEOUT_SECONDS:-30}
    volumes:
      - ./GestionTi_SoporteFiles:/app/storage/attachments
      - ./GestionTi_SoporteFiles/biometria/perfiles:/app/storage/perfiles
      - ./GestionTi_SoporteFiles/biometria/asistencias:/app/storage/asistencias
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      biometria-engine:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - app-network
      - biometria-internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  biometria-engine:
    build:
      context: ./biometria_engine
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8010"
    environment:
      - ENVIRONMENT=production
      - DEEPFACE_MODEL=${DEEPFACE_MODEL:-Facenet}
      - DEEPFACE_DETECTOR=${DEEPFACE_DETECTOR:-opencv}
      - ANTI_SPOOFING=${ANTI_SPOOFING:-1}
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:?BIOMETRIA_ENGINE_TOKEN requerido para biometria-engine}
    volumes:
      - deepface_weights:/root/.deepface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5).read()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - biometria-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v2
        - BUILD_SHA=${BUILD_SHA:-local}
    restart: always
    environment:
      - VITE_API_BASE_URL=/api/v2
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASS:-password_segura_refridcol}
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5433:5432"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  biometria-internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  deepface_weights:
