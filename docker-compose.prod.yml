services:
  nginx:
    image: nginx:alpine
    container_name: gestor-de-proyectos-ti-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: gestor-de-proyectos-ti-redis-prod
    restart: always
    networks:
      - app-network

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - TZ=America/Bogota
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./GestionTi_SoporteFiles:/app/storage/attachments
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v2
    restart: always
    environment:
      - VITE_API_BASE_URL=/api/v2
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASS:-password_segura_refridcol}
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5433:5432"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
