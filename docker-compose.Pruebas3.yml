x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    container_name: gestor-de-proyectos-ti-nginx-pruebas3
    restart: always
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.pruebas3.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network-pruebas3
    logging: *default-logging

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    container_name: gestor-de-proyectos-ti-backend-pruebas3
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager}
      - ERP_DATABASE_URL=${ERP_DATABASE_URL}
      - ENVIRONMENT=pruebas3
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - APP_VERSION=${APP_VERSION:-v2.4.0-DEV}
      - FRONTEND_URL=http://${FRONTEND_HOST:-localhost}
      - TZ=America/Bogota
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - app-network-pruebas3
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v2
    container_name: gestor-de-proyectos-ti-frontend-pruebas3
    restart: always
    environment:
      - VITE_API_BASE_URL=/api/v2
    depends_on:
      - backend
    networks:
      - app-network-pruebas3
    logging: *default-logging

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db-pruebas3
    restart: always
    volumes:
      - postgres_data_pruebas3:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-project_manager}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5435:5432"
    networks:
      - app-network-pruebas3
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    container_name: gestor-de-proyectos-ti-prometheus-pruebas3
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data_pruebas3:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - app-network-pruebas3
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    container_name: gestor-de-proyectos-ti-grafana-pruebas3
    ports:
      - "3001:3000"
    volumes:
      - grafana_data_pruebas3:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app-network-pruebas3
    logging: *default-logging

  loki:
    image: grafana/loki:latest
    container_name: gestor-de-proyectos-ti-loki-pruebas3
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - "3101:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network-pruebas3
    logging: *default-logging

  promtail:
    image: grafana/promtail:latest
    container_name: gestor-de-proyectos-ti-promtail-pruebas3
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network-pruebas3
    logging: *default-logging

networks:
  app-network-pruebas3:
    driver: bridge

volumes:
  postgres_data_pruebas3:
  prometheus_data_pruebas3:
  grafana_data_pruebas3:
