services:
  nginx:
    image: nginx:alpine
    container_name: gestor-de-proyectos-ti-nginx-pruebas3
    restart: always
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.pruebas3.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network-pruebas3

  redis:
    image: redis:alpine
    container_name: gestor-de-proyectos-ti-redis-pruebas3
    restart: always
    networks:
      - app-network-pruebas3

  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    container_name: gestor-de-proyectos-ti-backend-pruebas3
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env.pruebas3
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASS:-password_segura_refridcol}@db:${DB_PORT:-5432}/${DB_NAME:-project_manager_pruebas3}
      - TZ=America/Bogota
      - REDIS_URL=redis://redis:6379/0
      - BIOMETRIA_ENGINE_URL=http://biometria-engine:8010
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:?BIOMETRIA_ENGINE_TOKEN requerido para biometria-engine}
      - BIOMETRIA_ENGINE_TIMEOUT_SECONDS=${BIOMETRIA_ENGINE_TIMEOUT_SECONDS:-30}
    volumes:
      - ./GestionTi_SoporteFiles_Pruebas3:/app/storage/attachments
      - ./GestionTi_SoporteFiles_Pruebas3/biometria/perfiles:/app/storage/perfiles
      - ./GestionTi_SoporteFiles_Pruebas3/biometria/asistencias:/app/storage/asistencias
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      biometria-engine:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - app-network-pruebas3
      - biometria-internal-pruebas3

  biometria-engine:
    build:
      context: ./biometria_engine
      dockerfile: Dockerfile
    container_name: gestor-de-proyectos-ti-biometria-engine-pruebas3
    restart: always
    expose:
      - "8010"
    environment:
      - ENVIRONMENT=pruebas3
      - DEEPFACE_MODEL=${DEEPFACE_MODEL:-Facenet}
      - DEEPFACE_DETECTOR=${DEEPFACE_DETECTOR:-opencv}
      - ANTI_SPOOFING=${ANTI_SPOOFING:-1}
      - BIOMETRIA_ENGINE_TOKEN=${BIOMETRIA_ENGINE_TOKEN:?BIOMETRIA_ENGINE_TOKEN requerido para biometria-engine}
    volumes:
      - deepface_weights_pruebas3:/root/.deepface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5).read()\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - biometria-internal-pruebas3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v2
        - BUILD_SHA=${BUILD_SHA:-local}
    container_name: gestor-de-proyectos-ti-frontend-pruebas3
    restart: always
    environment:
      - VITE_API_BASE_URL=/api/v2
    depends_on:
      - backend
    networks:
      - app-network-pruebas3

  db:
    image: postgres:15-alpine
    container_name: gestor-de-proyectos-ti-db-pruebas3
    restart: always
    volumes:
      - postgres_data_pruebas3:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASS:-password_segura_refridcol}
      - POSTGRES_DB=${DB_NAME:-project_manager_pruebas3}
      - TZ=America/Bogota
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5435:5432"
    networks:
      - app-network-pruebas3

networks:
  app-network-pruebas3:
    driver: bridge
  biometria-internal-pruebas3:
    driver: bridge
    internal: true

volumes:
  postgres_data_pruebas3:
  deepface_weights_pruebas3:
